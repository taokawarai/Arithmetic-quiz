<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>算数テスト</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- TOP画面 -->
  <section id="screen-top" class="screen active">
    <div class="container">
      <h1>算数テスト</h1>
      <p class="subtitle">WAIS-IV 算数問題練習アプリ</p>
      <p class="description">レベルを選んでください。問題を読み上げるので、答えを入力してください。</p>
      <div class="level-buttons">
        <button class="btn btn-level level-btn level-1" data-level="1">
          <span class="level-num">Lv.1</span>
          <span class="level-desc">基礎</span>
        </button>
        <button class="btn btn-level level-btn level-2" data-level="2">
          <span class="level-num">Lv.2</span>
          <span class="level-desc">初級</span>
        </button>
        <button class="btn btn-level level-btn level-3" data-level="3">
          <span class="level-num">Lv.3</span>
          <span class="level-desc">中級</span>
        </button>
        <button class="btn btn-level level-btn level-4" data-level="4">
          <span class="level-num">Lv.4</span>
          <span class="level-desc">上級</span>
        </button>
      </div>
      <p id="speech-error" class="error-message" hidden>
        このブラウザは音声合成に対応していません。Chrome または Safari をお使いください。
      </p>
    </div>
  </section>

  <!-- 問題画面 -->
  <section id="screen-question" class="screen">
    <div class="container">
      <div class="question-header">
        <h2 id="question-level-label">レベル 1</h2>
        <span id="score-display" class="score-display">0 / 0</span>
      </div>

      <!-- 読み上げ速度設定 -->
      <div class="speed-control">
        <div class="speed-control-header">
          <label for="speech-rate-slider">読み上げ速度</label>
          <span class="speed-label-display speed-value">×1.0</span>
        </div>
        <input id="speech-rate-slider" class="speech-rate-slider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
        <div class="speed-marks">
          <span>遅い</span>
          <span>速い</span>
        </div>
        <div class="speech-mode-control">
          <span class="mode-label">読み方</span>
          <div class="mode-segmented">
            <button class="mode-btn" data-mode="joined">つなげる</button>
            <button class="mode-btn active" data-mode="separate">区切る</button>
          </div>
        </div>
      </div>

      <!-- 問題カード -->
      <div class="question-card">
        <p id="question-sub-category" class="question-sub-category"></p>
        <p id="question-text" class="question-text"></p>
      </div>

      <!-- ステータス -->
      <p id="status-text" class="status-text">「問題を読む」ボタンを押してください。</p>

      <!-- カウントダウン -->
      <div id="countdown-display" class="countdown" hidden>
        <span id="countdown-value">30</span>
        <span class="countdown-unit">秒</span>
      </div>

      <!-- 回答フォーム -->
      <div id="answer-form" class="answer-form" hidden>
        <input
          id="answer-input"
          type="text"
          inputmode="numeric"
          pattern="[0-9.]*"
          placeholder="答えを入力"
          autocomplete="off"
          disabled
        />
        <button id="btn-answer-submit" class="btn btn-success" disabled>回答</button>
      </div>

      <!-- ボタン行 -->
      <div class="button-row">
        <button id="btn-next-question" class="btn btn-primary">問題を読む</button>
        <button id="btn-show-result" class="btn btn-secondary">結果を見る</button>
      </div>

      <button id="btn-back-top" class="btn btn-secondary btn-block">← TOPへ戻る</button>

      <!-- 履歴 -->
      <div id="history-display" class="history-display"></div>
    </div>
  </section>

  <!-- 結果画面 -->
  <section id="screen-result" class="screen">
    <div class="container">
      <h2>結果</h2>
      <div class="result-box">
        <p id="result-level" class="result-level">レベル 1</p>
        <p class="result-label">正解数</p>
        <p id="result-score" class="result-digits">— / —</p>
        <p id="result-pct" class="result-pct">—%</p>
      </div>
      <div class="button-row">
        <button id="btn-retry" class="btn btn-primary">もう一度</button>
        <button id="btn-to-top" class="btn btn-secondary">TOPへ戻る</button>
      </div>
    </div>
  </section>

  <script src="js/patterns.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
